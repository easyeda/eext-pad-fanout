<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body {
			width: 100%;
			background: #1e1e1e;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			overflow: hidden;
		}
		.panel-content { padding: 7px 10px; }
		.top-bar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 6px;
		}
		.unit-toggle {
			display: flex;
			background: #2a2a2a;
			border: 1px solid #555;
			border-radius: 3px;
			overflow: hidden;
		}
		.unit-btn {
			padding: 2px 8px;
			font-size: 12px;
			color: #aaa;
			background: none;
			border: none;
			cursor: pointer;
		}
		.unit-btn.active { background: #667eea; color: #fff; }
		.btn-refresh {
			background: none;
			border: 1px solid #555;
			border-radius: 3px;
			color: #fff;
			font-size: 12px;
			padding: 2px 8px;
			cursor: pointer;
			line-height: 1;
		}
		.btn-refresh:hover { background: #2a2a2a; }
		.form-row {
			display: flex;
			align-items: center;
			margin-bottom: 4px;
			gap: 5px;
		}
		.form-row label {
			font-size: 13px;
			color: #fff;
			width: 72px;
			flex-shrink: 0;
		}
		.form-row select,
		.form-row input {
			flex: 1;
			padding: 2px 5px;
			background: #2a2a2a;
			border: 1px solid #555;
			border-radius: 3px;
			color: #fff;
			font-size: 13px;
			min-width: 0;
		}
		.form-row input[type=number] { text-align: right; }
		.toggle-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 6px;
			margin-top: 2px;
		}
		.toggle-label { font-size: 13px; color: #fff; }
		.toggle-switch { position: relative; display: inline-block; width: 36px; height: 20px; }
		.toggle-switch input { opacity: 0; width: 0; height: 0; }
		.toggle-slider {
			position: absolute; cursor: pointer; inset: 0;
			background: #3a3a3a; border-radius: 20px;
			transition: 0.2s;
		}
		.toggle-slider:before {
			content: ''; position: absolute;
			width: 14px; height: 14px; left: 3px; bottom: 3px;
			background: #aaa; border-radius: 50%; transition: 0.2s;
		}
		.toggle-switch input:checked + .toggle-slider { background: #667eea; }
		.toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); background: #fff; }
		.dir-section { margin-top: 5px; }
		.dir-label { font-size: 12px; color: #fff; margin-bottom: 3px; }
		.dir-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 3px;
		}
		.btn-dir {
			padding: 6px 0;
			background: #2a2a2a;
			border: 1px solid #667eea;
			border-radius: 3px;
			color: #fff;
			font-size: 15px;
			cursor: pointer;
			text-align: center;
			line-height: 1;
			transition: background 0.1s;
		}
		.btn-dir:hover { background: #3a3a3a; }
		.btn-dir:active { background: #667eea; }
		.dir-placeholder { background: transparent; }
		.dir-note {
			font-size: 9px;
			color: #ccc;
			margin-top: 4px;
			line-height: 1.4;
		}
	</style>
</head>
<body>
	<div class="panel-content">
		<div class="top-bar">
			<div class="unit-toggle">
				<button class="unit-btn active" id="unit-mm" onclick="setUnit('mm')">mm</button>
				<button class="unit-btn" id="unit-mil" onclick="setUnit('mil')">mil</button>
			</div>
			<button class="btn-refresh" onclick="doRefresh()" title="刷新PCB规则">↺ 刷新</button>
		</div>

		<div class="form-row">
			<label>过孔类型</label>
			<select id="via-type">
				<option value="0">通孔</option>
			</select>
		</div>
		<div class="form-row">
			<label>外径</label>
			<input type="number" id="via-outer" value="0.610" step="0.001" min="0.001" max="100">
		</div>
		<div class="form-row">
			<label>孔径</label>
			<input type="number" id="via-inner" value="0.305" step="0.001" min="0.001" max="100">
		</div>
		<div class="form-row">
			<label>线宽</label>
			<input type="number" id="line-width" value="0.254" step="0.001" min="0.001" max="100">
		</div>
		<div class="form-row">
			<label>线长</label>
			<input type="number" id="line-length" value="2.540" step="0.001" min="0.001" max="1000">
		</div>
		<div class="form-row">
			<label>参差</label>
			<input type="number" id="stagger-length" value="0.000" step="0.001" min="0" max="1000">
		</div>

		<div class="toggle-row">
			<span class="toggle-label">光标扇出</span>
			<label class="toggle-switch">
				<input type="checkbox" id="cursor-toggle" onchange="onCursorToggle()">
				<span class="toggle-slider"></span>
			</label>
		</div>

		<div class="dir-section">
			<div class="dir-label">扇出方向</div>
			<div class="dir-grid">
				<button class="btn-dir" onclick="clickDir(-1,1)">↖</button>
				<button class="btn-dir" onclick="clickDir(0,1)">↑</button>
				<button class="btn-dir" onclick="clickDir(1,1)">↗</button>
				<button class="btn-dir" onclick="clickDir(-1,0)">←</button>
				<div class="dir-placeholder"></div>
				<button class="btn-dir" onclick="clickDir(1,0)">→</button>
				<button class="btn-dir" onclick="clickDir(-1,-1)">↙</button>
				<button class="btn-dir" onclick="clickDir(0,-1)">↓</button>
				<button class="btn-dir" onclick="clickDir(1,-1)">↘</button>
			</div>
			<div class="dir-note">注意：非圆形焊盘有旋转角时，方向为焊盘局部坐标方向</div>
		</div>
	</div>

	<script>
		var currentUnit = 'mm';

		function mmToMil(v) { return v * 39.3701; }
		function milToMm(v) { return v / 39.3701; }

		function setUnit(unit) {
			if (unit === currentUnit) return;
			var ids = ['via-outer', 'via-inner', 'line-width', 'line-length', 'stagger-length'];
			ids.forEach(function(id) {
				var el = document.getElementById(id);
				var val = parseFloat(el.value) || 0;
				if (unit === 'mil') {
					el.value = mmToMil(val).toFixed(2);
					el.step = '0.1';
				} else {
					el.value = milToMm(val).toFixed(3);
					el.step = '0.001';
				}
			});
			currentUnit = unit;
			document.getElementById('unit-mm').className = 'unit-btn' + (unit === 'mm' ? ' active' : '');
			document.getElementById('unit-mil').className = 'unit-btn' + (unit === 'mil' ? ' active' : '');
		}

		function getValueMm(id) {
			var val = parseFloat(document.getElementById(id).value) || 0;
			return currentUnit === 'mil' ? milToMm(val) : val;
		}

		function setValueFromMm(id, mmVal) {
			var el = document.getElementById(id);
			if (currentUnit === 'mil') {
				el.value = mmToMil(mmVal).toFixed(2);
				el.step = '0.1';
			} else {
				el.value = mmVal.toFixed(3);
				el.step = '0.001';
			}
		}

		function clickDir(dx, dy) {
			if (typeof eda !== 'undefined' && eda.sys_MessageBus) {
				eda.sys_MessageBus.publishPublic('pad-fanout-direction', { dx: dx, dy: dy });
			}
		}

		function onCursorToggle() {
			var enabled = document.getElementById('cursor-toggle').checked;
			if (typeof eda !== 'undefined' && eda.sys_MessageBus) {
				eda.sys_MessageBus.publishPublic('pad-fanout-cursor-toggle', { enabled: enabled });
			}
		}

		function doRefresh() {
			if (typeof eda !== 'undefined' && eda.sys_MessageBus) {
				eda.sys_MessageBus.publishPublic('pad-fanout-refresh', {});
			}
		}

		function sendParamsUpdate() {
			if (typeof eda === 'undefined' || !eda.sys_MessageBus) return;
			var update = {
				viaDiameter: getValueMm('via-outer'),
				holeDiameter: getValueMm('via-inner'),
				lineWidth: getValueMm('line-width'),
				lineLength: getValueMm('line-length'),
				staggerLength: getValueMm('stagger-length'),
				viaTypeIndex: parseInt(document.getElementById('via-type').value) || 0
			};
			eda.sys_MessageBus.publishPublic('pad-fanout-params-update', update);
		}

		function bindParamInputs() {
			['via-outer', 'via-inner', 'line-width', 'line-length', 'stagger-length'].forEach(function(id) {
				document.getElementById(id).addEventListener('change', sendParamsUpdate);
			});
			document.getElementById('via-type').addEventListener('change', sendParamsUpdate);
		}

		function initMessageSubscription() {
			if (typeof eda === 'undefined' || !eda.sys_MessageBus) return;

			eda.sys_MessageBus.subscribePublic('pad-fanout-init', function(params) {
				if (params.viaDiameter) setValueFromMm('via-outer', params.viaDiameter);
				if (params.holeDiameter) setValueFromMm('via-inner', params.holeDiameter);
				if (params.lineWidth) setValueFromMm('line-width', params.lineWidth);
				if (params.lineLength) setValueFromMm('line-length', params.lineLength);
				if (params.staggerLength !== undefined) setValueFromMm('stagger-length', params.staggerLength);
				if (Array.isArray(params.viaTypeOptions) && params.viaTypeOptions.length > 0) {
					var select = document.getElementById('via-type');
					select.innerHTML = '';
					params.viaTypeOptions.forEach(function(opt, i) {
						var el = document.createElement('option');
						el.value = i;
						el.textContent = opt.label;
						select.appendChild(el);
					});
				}
			});

			eda.sys_MessageBus.subscribePublic('pad-fanout-reset-ui', function() {
				document.getElementById('cursor-toggle').checked = false;
			});
		}

		document.addEventListener('keydown', function(e) {
			if (e.key === 'Escape') {
				var toggle = document.getElementById('cursor-toggle');
				if (toggle.checked) {
					toggle.checked = false;
					if (typeof eda !== 'undefined' && eda.sys_MessageBus) {
						eda.sys_MessageBus.publishPublic('pad-fanout-cursor-toggle', { enabled: false });
					}
				} else {
					if (typeof eda !== 'undefined' && eda.sys_MessageBus) {
						eda.sys_MessageBus.publishPublic('pad-fanout-action', { action: 'cancel' });
					}
				}
			}
		});

		initMessageSubscription();
		bindParamInputs();
	</script>
</body>
</html>
